<!DOCTYPE html>
<html lang="fr">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Connexion — Résumeur</title>
  <link rel="stylesheet" href="/static/style.css" />
</head>
<body class="login-body">
  <main class="login-container">
    <form action="/api/login" method="POST" class="card login-card">
      <h1>Connexion</h1>
      <p class="subtitle">Identifiants requis pour accéder à l'app.</p>

      <label class="field">
        <span>Utilisateur</span>
        <input name="username" type="text" autocomplete="username" required autofocus />
      </label>

      <label class="field">
        <span>Mot de passe</span>
        <input name="password" type="password" autocomplete="current-password" required />
      </label>

      <button type="submit">Se connecter</button>
      <p id="error-msg" class="error" aria-live="polite"></p>
    </form>
  </main>

  <script>
    if (new URLSearchParams(location.search).has("error")) {
      document.getElementById("error-msg").textContent = "Identifiants invalides.";
    }
  </script>
</body>
</html>
